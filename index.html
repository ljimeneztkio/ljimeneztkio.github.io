<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Acceso especial — solo para ti." />
  <title>Acceso Especial 💚</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="password.css" />
</head>

<body>

  <!-- Partículas decorativas -->
  <div class="particles" aria-hidden="true">
    <span>💚</span><span>💚</span><span>💚</span>
    <span>💚</span><span>💚</span><span>💚</span>
    <span>💚</span><span>💚</span><span>💚</span>
  </div>

  <main class="login-wrapper">

    <div class="login-card" id="login-card">

      <!-- Ícono de candado animado -->
      <div class="lock-icon" id="lock-icon" aria-hidden="true">🔒</div>

      <h1 class="login-title">Acceso Especial</h1>
      <p class="login-subtitle">Solo para alguien muy especial 💚</p>

      <form class="login-form" id="login-form" autocomplete="off" novalidate>

        <label class="form-label" for="secret-input">
          Objeto con el que te pegué sin intención el otro día:
        </label>

        <div class="input-wrapper">
          <input type="text" id="secret-input" class="form-input" placeholder="Escribe aquí…"
            aria-describedby="error-msg" autofocus />
          <span class="input-icon">🔑</span>
        </div>

        <p class="error-msg" id="error-msg" role="alert" aria-live="polite"></p>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span class="btn-text">Abrir 💚</span>
          <span class="btn-loader" aria-hidden="true"></span>
        </button>

      </form>

    </div>

    <!-- Pantalla de éxito (oculta al inicio) -->
    <div class="success-screen" id="success-screen" aria-hidden="true">
      <div class="success-icon">💚</div>
      <h2 class="success-title">¡Correcto, bichita! 🎉</h2>
      <p class="success-sub">Abriendo tus mensajes…</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

  </main>

  <script>
    const SECRET = 'ramita';

    const form = document.getElementById('login-form');
    const input = document.getElementById('secret-input');
    const errorMsg = document.getElementById('error-msg');
    const lockIcon = document.getElementById('lock-icon');
    const loginCard = document.getElementById('login-card');
    const successSc = document.getElementById('success-screen');
    const progressBar = document.getElementById('progress-bar');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const value = input.value.trim().toLowerCase();

      if (value === SECRET) {
        // Limpiar error
        errorMsg.textContent = '';
        input.classList.remove('input-error');

        // Animación de unlock
        lockIcon.textContent = '🔓';
        lockIcon.classList.add('unlocked');

        // Fade out card → fade in success
        setTimeout(function () {
          loginCard.classList.add('card-fade-out');
        }, 300);

        setTimeout(function () {
          loginCard.style.display = 'none';
          successSc.style.display = 'flex';
          successSc.setAttribute('aria-hidden', 'false');
          successSc.classList.add('success-visible');

          // Animación barra de progreso → redirect
          progressBar.style.width = '100%';
        }, 900);

        setTimeout(function () {
          window.location.href = 'amorcita.html';
        }, 2400);

      } else {
        // Contraseña incorrecta
        input.classList.add('input-error');
        input.value = '';

        errorMsg.textContent = '¡Eso no es! Piénsalo bien… 💭';

        // Efecto shake en la tarjeta
        loginCard.classList.remove('shake');
        void loginCard.offsetWidth; // reflow para reiniciar animación
        loginCard.classList.add('shake');

        // Ícono de candado sacude
        lockIcon.textContent = '🔒';
        lockIcon.classList.remove('unlocked');

        // Quitar el error después de un momento
        setTimeout(function () {
          input.classList.remove('input-error');
          errorMsg.textContent = '';
        }, 2500);
      }
    });

    // Limpiar error al escribir
    input.addEventListener('input', function () {
      if (input.classList.contains('input-error')) {
        input.classList.remove('input-error');
        errorMsg.textContent = '';
      }
    });
  </script>

</body>

</html>
